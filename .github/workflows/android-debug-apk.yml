name: Build Android Debug APK

on:
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.14.3
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.3

      - name: Generate Android project files
        run: |
          mkdir -p app/src/main/java/com/example/protivozachatochnye
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml

          cat > settings.gradle.kts <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "protivozachatochnye"
          include(":app")
          EOF

          cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.5.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.24" apply false
          }
          EOF

          cat > gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          kotlin.code.style=official
          android.nonTransitiveRClass=true
          EOF

          cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.example.protivozachatochnye"
              compileSdk = 35

              defaultConfig {
                  applicationId = "com.example.protivozachatochnye"
                  minSdk = 24
                  targetSdk = 35
                  versionCode = 1
                  versionName = "1.0"
              }

              buildTypes {
                  release {
                      isMinifyEnabled = false
                      proguardFiles(
                          getDefaultProguardFile("proguard-android-optimize.txt"),
                          "proguard-rules.pro"
                      )
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }

              buildFeatures {
                  compose = true
              }

              composeOptions {
                  kotlinCompilerExtensionVersion = "1.5.14"
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.13.1")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.8.4")
              implementation("androidx.activity:activity-compose:1.9.1")
              implementation(platform("androidx.compose:compose-bom:2024.06.00"))
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-tooling-preview")
              implementation("androidx.compose.material3:material3")
              implementation("androidx.datastore:datastore-preferences:1.1.1")

              debugImplementation("androidx.compose.ui:ui-tooling")
              debugImplementation("androidx.compose.ui:ui-test-manifest")
          }
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <application
                  android:allowBackup="true"
                  android:fullBackupContent="@xml/backup_rules"
                  android:icon="@android:drawable/ic_dialog_info"
                  android:label="@string/app_name"
                  android:roundIcon="@android:drawable/ic_dialog_info"
                  android:supportsRtl="true"
                  android:theme="@android:style/Theme.DeviceDefault.Light.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>

          </manifest>
          EOF

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">Противозачаточные</string>
          </resources>
          EOF

          cat > app/src/main/res/xml/backup_rules.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <full-backup-content>
              <exclude domain="sharedpref" path="" />
          </full-backup-content>
          EOF

          cat > app/proguard-rules.pro <<'EOF'
          # Intentionally empty.
          EOF

          cat > app/src/main/java/com/example/protivozachatochnye/MainActivity.kt <<'EOF'
          package com.example.protivozachatochnye

          import android.content.Context
          import android.os.Bundle
          import androidx.activity.ComponentActivity
          import androidx.activity.compose.setContent
          import androidx.compose.foundation.layout.Arrangement
          import androidx.compose.foundation.layout.Column
          import androidx.compose.foundation.layout.PaddingValues
          import androidx.compose.foundation.layout.fillMaxSize
          import androidx.compose.foundation.layout.fillMaxWidth
          import androidx.compose.foundation.layout.padding
          import androidx.compose.material3.Button
          import androidx.compose.material3.MaterialTheme
          import androidx.compose.material3.OutlinedTextField
          import androidx.compose.material3.Surface
          import androidx.compose.material3.Text
          import androidx.compose.runtime.Composable
          import androidx.compose.runtime.collectAsState
          import androidx.compose.runtime.getValue
          import androidx.compose.runtime.mutableStateOf
          import androidx.compose.runtime.remember
          import androidx.compose.runtime.setValue
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.text.input.KeyboardOptions
          import androidx.compose.ui.text.input.KeyboardType
          import androidx.compose.ui.unit.dp
          import androidx.datastore.preferences.core.edit
          import androidx.datastore.preferences.core.intPreferencesKey
          import androidx.datastore.preferences.core.longPreferencesKey
          import androidx.datastore.preferences.preferencesDataStore
          import kotlinx.coroutines.flow.Flow
          import kotlinx.coroutines.flow.map
          import kotlinx.coroutines.runBlocking
          import java.time.LocalDate
          import java.time.ZoneId

          private val Context.dataStore by preferencesDataStore(name = "pill_settings")

          private object PillPreferences {
              val pillsInPack = intPreferencesKey("pills_in_pack")
              val startDateEpoch = longPreferencesKey("start_date_epoch")
          }

          data class PillSettings(
              val pillsInPack: Int?,
              val startDateEpoch: Long?
          )

          class MainActivity : ComponentActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)

                  setContent {
                      val settingsFlow: Flow<PillSettings> = dataStore.data.map { preferences ->
                          PillSettings(
                              pillsInPack = preferences[PillPreferences.pillsInPack],
                              startDateEpoch = preferences[PillPreferences.startDateEpoch]
                          )
                      }

                      val settings by settingsFlow.collectAsState(initial = PillSettings(null, null))

                      Surface(modifier = Modifier.fillMaxSize(), color = MaterialTheme.colorScheme.background) {
                          if (settings.pillsInPack == null || settings.startDateEpoch == null) {
                              SetupScreen(onSave = { packSize -> saveInitialSettings(packSize) })
                          } else {
                              DayScreen(
                                  pillsInPack = settings.pillsInPack,
                                  startDateEpoch = settings.startDateEpoch
                              )
                          }
                      }
                  }
              }

              private fun saveInitialSettings(packSize: Int) = runBlocking {
                  val today = LocalDate.now().toEpochDay()
                  dataStore.edit { preferences ->
                      preferences[PillPreferences.pillsInPack] = packSize
                      preferences[PillPreferences.startDateEpoch] = today
                  }
              }
          }

          @Composable
          private fun SetupScreen(onSave: (Int) -> Unit) {
              var input by remember { mutableStateOf("") }
              val parsed = input.toIntOrNull()
              val isValid = parsed != null && parsed > 0

              Column(
                  modifier = Modifier
                      .fillMaxSize()
                      .padding(24.dp),
                  verticalArrangement = Arrangement.Center,
                  horizontalAlignment = Alignment.CenterHorizontally
              ) {
                  Text(
                      text = "Добро пожаловать!",
                      style = MaterialTheme.typography.headlineSmall
                  )
                  Text(
                      text = "Укажите количество таблеток в упаковке",
                      modifier = Modifier.padding(top = 8.dp, bottom = 20.dp)
                  )

                  OutlinedTextField(
                      modifier = Modifier.fillMaxWidth(),
                      value = input,
                      onValueChange = { input = it.filter(Char::isDigit) },
                      label = { Text("Количество") },
                      singleLine = true,
                      keyboardOptions = KeyboardOptions(keyboardType = KeyboardType.Number)
                  )

                  Button(
                      onClick = { parsed?.let(onSave) },
                      enabled = isValid,
                      modifier = Modifier.padding(top = 16.dp),
                      contentPadding = PaddingValues(horizontal = 24.dp, vertical = 12.dp)
                  ) {
                      Text("Сохранить")
                  }
              }
          }

          @Composable
          private fun DayScreen(pillsInPack: Int, startDateEpoch: Long) {
              val todayEpoch = LocalDate.now(ZoneId.systemDefault()).toEpochDay()
              val passedDays = (todayEpoch - startDateEpoch).toInt().coerceAtLeast(0)
              val todayPillNumber = (passedDays % pillsInPack) + 1

              Column(
                  modifier = Modifier
                      .fillMaxSize()
                      .padding(24.dp),
                  verticalArrangement = Arrangement.Center,
                  horizontalAlignment = Alignment.CenterHorizontally
              ) {
                  Text(
                      text = "Сегодня нужно принять таблетку №$todayPillNumber",
                      style = MaterialTheme.typography.headlineSmall
                  )

                  Text(
                      text = "День цикла: ${passedDays + 1}",
                      modifier = Modifier.padding(top = 12.dp)
                  )

                  Text(
                      text = "Всего таблеток в упаковке: $pillsInPack",
                      modifier = Modifier.padding(top = 8.dp)
                  )
              }
          }
          EOF

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace --info

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
